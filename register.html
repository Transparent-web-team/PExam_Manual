<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký - Hệ thống thi trắc nghiệm trực tuyến PTIT</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>
  <header class="hero" role="banner">
    <div class="hero-inner">
      <img src="assets/backgroundptit.webp" alt="Học viện Công nghệ Bưu chính Viễn thông" class="hero-banner" />
    </div>
  </header>

  <main>
    <section class="page-title">
      <h1>HỆ THỐNG THI TRẮC NGHIỆM TRỰC TUYẾN PTIT</h1>
    </section>

    <section class="login-section" aria-labelledby="register-heading">
      <div class="login-card">
        <h2 id="register-heading">Đăng ký</h2>
        <form class="login-form" id="register-form">
          <div class="form-group">
            <label for="reg-username">Tên đăng nhập</label>
            <input type="text" id="reg-username" name="username" placeholder="Nhập tên đăng nhập" required />
          </div>
          <div class="form-group">
            <label for="reg-email">Gmail</label>
            <input type="email" id="reg-email" name="email" placeholder="Nhập gmail" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Mật khẩu</label>
            <input type="password" id="reg-password" name="password" placeholder="Nhập mật khẩu" required />
          </div>
          <div class="form-group">
            <label for="reg-confirm-password">Nhập lại mật khẩu</label>
            <input type="password" id="reg-confirm-password" name="confirm_password" placeholder="Nhập lại mật khẩu"
              required />
          </div>
          <button type="submit" class="btn-primary">Đăng ký</button>
          <p class="register-text">
            Đã có tài khoản?
            <a href="index.html" class="register-link">Đăng nhập</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script>
    // Xử lý sự kiện đăng ký ảo
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("register-form");
      if (!form) return;

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const password = document.getElementById("reg-password").value;
        const confirmPassword = document.getElementById("reg-confirm-password").value;

        if (password !== confirmPassword) {
          alert("Mật khẩu nhập lại không khớp!");
          return;
        }

        alert("Đăng ký thành công! Vui lòng đăng nhập.");
        window.location.href = "index.html";
      });
    });
  </script>
</body>

</html>
