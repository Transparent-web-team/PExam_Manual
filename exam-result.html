<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kết quả bài thi - Hệ thống thi trắc nghiệm PTIT</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/result.css" />
</head>

<body>
    <header class="app-header">
        <div class="app-header-inner">
            <div class="app-header-left">
                <img src="assets/logoptit.png" alt="Học viện Công nghệ Bưu chính Viễn thông" class="app-logo" />
            </div>
            <h1 class="app-title">HỆ THỐNG THI TRẮC NGHIỆM TRỰC TUYẾN PTIT</h1>
            <button class="btn-danger" onclick="window.location.href='index.html'">
                Đăng xuất
            </button>
        </div>
    </header>

    <main class="result-main">
        <section class="result-summary" aria-label="Tổng quan kết quả">
            <h1>Kết quả bài thi: Lập trình Web</h1>
            <div class="score-circle">
                <span class="score-number" id="final-score">0/10</span>
                <span class="score-label">Điểm số</span>
            </div>
            <div class="stats-row">
                <div class="stat-box">Số câu đúng: <strong class="text-success" id="correct-count">0</strong></div>
                <div class="stat-box">Số câu sai: <strong class="text-danger" id="wrong-count">0</strong></div>
                <div class="stat-box">Chưa làm: <strong class="text-muted" id="unanswered-count">0</strong></div>
                <div class="stat-box">Thời gian làm bài: <strong id="time-taken">45:12</strong></div>
            </div>
            <div class="action-buttons">
                <button class="btn-secondary" onclick="window.location.href='user-home.html'">Về trang chủ</button>
                <button class="btn-secondary" onclick="window.location.href='exam-taking.html'">Làm lại bài thi</button>
            </div>
        </section>

        <section class="result-details" aria-label="Chi tiết bài làm">
            <h2>Chi tiết bài làm</h2>
            <div class="filter-bar">
                <button class="btn-filter active" data-filter="all">Tất cả</button>
                <button class="btn-filter correct" data-filter="correct">Đúng (<span
                        id="filter-correct-count">0</span>)</button>
                <button class="btn-filter wrong" data-filter="wrong">Sai (<span
                        id="filter-wrong-count">0</span>)</button>
                <button class="btn-filter unanswered" data-filter="unanswered">Chưa làm (<span
                        id="filter-unanswered-count">0</span>)</button>
            </div>

            <div class="review-list" id="review-list">
                <!-- detail cards generated by JS -->
            </div>
        </section>
    </main>

    <script src="assets/js/exam-result.js"></script>
</body>

</html>
